<!DOCTYPE html>
<html lang="en">
<head>

    <!-- =========================================================
         META INFO
    ========================================================== -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Wishlist | Nexstep</title>

    <!-- =========================================================
         FONTS & ICONS
    ========================================================== -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- =========================================================
         CSS FILES
    ========================================================== -->

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="navbar.css">

    <!-- =========================================================
         PREMIUM STYLES
    ========================================================== -->

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Poppins',sans-serif;

            overflow-x:hidden;

            background:
            linear-gradient(
                135deg,
                #120002,
                #320007,
                #5c000f,
                #140003
            );

            min-height:100vh;

            color:white;
        }

        :root{

            --gold:#d4af37;

            --light-gold:#f5d76e;

            --glass:
            rgba(255,255,255,0.06);

            --border:
            rgba(255,215,120,0.12);
        }

        /* =========================================================
           BACKGROUND EFFECTS
        ========================================================== */

        body::before{

            content:"";

            position:fixed;

            width:450px;
            height:450px;

            top:-120px;
            right:-120px;

            background:
            radial-gradient(
                circle,
                rgba(212,175,55,0.18),
                transparent 70%
            );

            filter:blur(70px);

            z-index:-1;
        }

        body::after{

            content:"";

            position:fixed;

            width:350px;
            height:350px;

            bottom:-100px;
            left:-100px;

            background:
            radial-gradient(
                circle,
                rgba(255,0,90,0.12),
                transparent 70%
            );

            filter:blur(70px);

            z-index:-1;
        }

        /* =========================================================
           PAGE SECTION
        ========================================================== */

        .wishlist-section{

            padding:
            140px 7% 80px;
        }

        .page-header{

            display:flex;
            justify-content:space-between;
            align-items:center;

            flex-wrap:wrap;

            gap:20px;

            margin-bottom:50px;
        }

        .page-title{

            font-size:3rem;

            font-weight:800;

            color:#fff4c7;
        }

        .page-subtitle{

            color:
            rgba(255,245,230,0.7);

            margin-top:10px;
        }

        .wishlist-count{

            padding:14px 22px;

            border-radius:18px;

            background:
            rgba(255,255,255,0.05);

            border:
            1px solid var(--border);

            backdrop-filter:blur(10px);

            font-weight:600;

            color:#fff2b3;
        }

        /* =========================================================
           GRID
        ========================================================== */

        .wishlist-grid{

            display:grid;

            grid-template-columns:
            repeat(auto-fit,minmax(280px,1fr));

            gap:30px;
        }

        /* =========================================================
           PRODUCT CARD
        ========================================================== */

        .wishlist-card{

            background:
            rgba(255,255,255,0.05);

            border:
            1px solid var(--border);

            border-radius:28px;

            overflow:hidden;

            backdrop-filter:blur(12px);

            transition:0.4s ease;

            position:relative;
        }

        .wishlist-card:hover{

            transform:
            translateY(-10px);

            border-color:
            rgba(255,215,120,0.3);

            box-shadow:
            0 25px 50px rgba(0,0,0,0.3);
        }

        .wishlist-image{

            position:relative;

            overflow:hidden;
        }

        .wishlist-image img{

            width:100%;
            height:260px;

            object-fit:cover;

            transition:0.5s ease;
        }

        .wishlist-card:hover img{

            transform:
            scale(1.06);
        }

        .wishlist-badge{

            position:absolute;

            top:18px;
            left:18px;

            background:
            linear-gradient(
                135deg,
                #d4af37,
                #f5d76e
            );

            color:#2a0006;

            padding:8px 14px;

            border-radius:50px;

            font-size:13px;
            font-weight:700;
        }

        .wishlist-content{

            padding:25px;
        }

        .wishlist-name{

            font-size:1.25rem;

            font-weight:700;

            margin-bottom:10px;
        }

        .wishlist-desc{

            color:
            rgba(255,245,230,0.68);

            line-height:1.7;

            margin-bottom:18px;

            font-size:14px;
        }

        .wishlist-price{

            font-size:1.4rem;

            font-weight:800;

            color:#fff2b3;

            margin-bottom:25px;
        }

        /* =========================================================
           BUTTONS
        ========================================================== */

        .wishlist-actions{

            display:flex;

            gap:12px;
        }

        .btn{

            flex:1;

            padding:14px;

            border:none;

            border-radius:16px;

            cursor:pointer;

            font-weight:700;

            transition:0.35s ease;

            font-size:14px;
        }

        .btn-cart{

            background:
            linear-gradient(
                135deg,
                #d4af37,
                #f5d76e
            );

            color:#2a0006;

            box-shadow:
            0 12px 30px
            rgba(212,175,55,0.3);
        }

        .btn-cart:hover{

            transform:
            translateY(-4px);

            box-shadow:
            0 18px 40px
            rgba(212,175,55,0.45);
        }

        .btn-remove{

            max-width:60px;

            background:
            rgba(255,255,255,0.05);

            border:
            1px solid rgba(255,255,255,0.08);

            color:#ff6b6b;
        }

        .btn-remove:hover{

            background:
            rgba(255,0,0,0.12);
        }

        /* =========================================================
           EMPTY STATE
        ========================================================== */

        .empty-state{

            text-align:center;

            padding:120px 20px;

            background:
            rgba(255,255,255,0.04);

            border:
            1px solid var(--border);

            border-radius:32px;

            backdrop-filter:blur(10px);
        }

        .empty-state i{

            font-size:5rem;

            color:rgba(255,255,255,0.2);

            margin-bottom:25px;
        }

        .empty-state h2{

            font-size:2rem;

            margin-bottom:15px;

            color:#fff4c7;
        }

        .empty-state p{

            color:
            rgba(255,245,230,0.68);

            margin-bottom:35px;
        }

        .shop-btn{

            display:inline-flex;
            align-items:center;
            gap:10px;

            padding:16px 28px;

            border-radius:18px;

            background:
            linear-gradient(
                135deg,
                #d4af37,
                #f5d76e
            );

            color:#2a0006;

            font-weight:700;

            text-decoration:none;

            transition:0.35s ease;
        }

        .shop-btn:hover{

            transform:
            translateY(-4px);
        }

        /* =========================================================
           POPUP
        ========================================================== */

        .popup{

            position:fixed;

            top:30px;
            right:30px;

            background:
            linear-gradient(
                135deg,
                #d4af37,
                #f5d76e
            );

            color:#2a0006;

            padding:18px 28px;

            border-radius:18px;

            font-weight:700;

            display:flex;
            align-items:center;
            gap:10px;

            transform:translateX(120%);

            transition:0.5s ease;

            z-index:9999;
        }

        .popup.active{

            transform:translateX(0);
        }

        /* =========================================================
           RESPONSIVE
        ========================================================== */

        @media(max-width:768px){

            .page-title{

                font-size:2.3rem;
            }

            .wishlist-section{

                padding:
                120px 20px 60px;
            }

            .wishlist-actions{

                flex-direction:column;
            }

            .btn-remove{

                max-width:100%;
            }
        }

    </style>

</head>

<body>

    <!-- =========================================================
         NAVBAR
    ========================================================== -->

    <div id="navbar-placeholder"></div>

    <!-- =========================================================
         POPUP
    ========================================================== -->

    <div class="popup" id="popup">

        <i class="fas fa-check-circle"></i>

        Added To Cart Successfully

    </div>

    <!-- =========================================================
         WISHLIST SECTION
    ========================================================== -->

    <section class="wishlist-section">

        <!-- HEADER -->

        <div class="page-header">

            <div>

                <h1 class="page-title">

                    My Wishlist

                </h1>

                <p class="page-subtitle">

                    Save your favorite premium sneakers
                    and shop them anytime.

                </p>

            </div>

            <div class="wishlist-count">

                <span id="wishlist-count">

                    0

                </span>

                Items Saved

            </div>

        </div>

        <!-- PRODUCTS -->
        <div
            id="wishlist-grid"
            class="wishlist-grid"
        >

        </div>

    </section>

    <!-- =========================================================
         FOOTER
    ========================================================== -->

    <div id="footer-placeholder"></div>

    <!-- =========================================================
         JAVASCRIPT
    ========================================================== -->

    <script src="localstorage.js"></script>
    <script src="toast.js"></script>
    <script src="cart.js"></script>
    <script src="main.js"></script>

    <script>

    
    </script>

<script src="wishlist.js"></script>

</body>
</html>
