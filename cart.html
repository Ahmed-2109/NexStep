<!DOCTYPE html>
<html lang="en">

<head>

         META INFO
    ========================================================== -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Your Cart | Nexstep</title>

    <!-- =========================================================
         GOOGLE FONTS
    ========================================================== -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet"
    >

    <!-- =========================================================
         FONT AWESOME
    ========================================================== -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- =========================================================
         PREMIUM CART PAGE STYLE
    ========================================================== -->

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Poppins',sans-serif;

            overflow-x:hidden;

            background:
            linear-gradient(
                135deg,
                #120003,
                #2a0006,
                #4a000c
            );

            color:white;
        }

        .cart-page{

            padding:
            140px 8% 80px;
        }

        .cart-header{

            text-align:center;

            margin-bottom:60px;
        }

        .cart-header h1{

            font-size:4rem;

            font-weight:900;

            margin-bottom:15px;

            background:
            linear-gradient(
                135deg,
                #ffd700,
                #f5d76e
            );

            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .cart-header p{

            color:
            rgba(255,255,255,0.7);

            font-size:1.1rem;
        }

        .cart-layout{

            display:grid;

            grid-template-columns:
            2fr 1fr;

            gap:35px;
        }

        .cart-items{

            display:flex;

            flex-direction:column;

            gap:25px;
        }

        .cart-card{

            background:
            rgba(255,255,255,0.05);

            border:
            1px solid rgba(255,215,0,0.15);

            backdrop-filter:blur(12px);

            border-radius:28px;

            padding:25px;

            display:flex;

            align-items:center;

            gap:25px;

            transition:0.4s ease;
        }

        .cart-card:hover{

            transform:
            translateY(-6px);

            box-shadow:
            0 20px 40px
            rgba(0,0,0,0.25);

            border-color:
            rgba(255,215,0,0.3);
        }

        .cart-card img{

            width:130px;
            height:130px;

            object-fit:cover;

            border-radius:20px;

            background:white;
        }

        .cart-info{

            flex:1;
        }

        .cart-info h3{

            font-size:1.4rem;

            margin-bottom:10px;
        }

        .product-category{

            color:#f5d76e;

            font-size:14px;

            margin-bottom:12px;
        }

        .price{

            font-size:1.2rem;

            font-weight:700;

            color:#ffd700;
        }

        .cart-controls{

            display:flex;

            flex-direction:column;

            align-items:flex-end;

            gap:15px;
        }

        .quantity-box{

            display:flex;

            align-items:center;

            gap:15px;

            background:
            rgba(255,255,255,0.05);

            padding:10px 15px;

            border-radius:14px;
        }

        .qty-btn{

            width:38px;
            height:38px;

            border:none;

            border-radius:12px;

            cursor:pointer;

            font-size:18px;

            font-weight:700;

            color:#2a0006;

            background:
            linear-gradient(
                135deg,
                #ffd700,
                #f5d76e
            );

            transition:0.3s ease;
        }

        .qty-btn:hover{

            transform:scale(1.08);
        }

        .remove-btn{

            background:none;

            border:none;

            color:#ff4d6d;

            cursor:pointer;

            font-weight:600;

            transition:0.3s ease;
        }

        .remove-btn:hover{

            color:#ff758f;
        }

        .cart-summary{

            position:sticky;

            top:120px;

            height:fit-content;

            background:
            rgba(255,255,255,0.05);

            border:
            1px solid rgba(255,215,0,0.15);

            backdrop-filter:blur(12px);

            border-radius:28px;

            padding:35px;
        }

        .summary-title{

            font-size:2rem;

            margin-bottom:30px;

            color:#ffd700;
        }

        .summary-row{

            display:flex;

            justify-content:space-between;

            margin-bottom:18px;

            color:
            rgba(255,255,255,0.8);
        }

        .summary-total{

            margin-top:25px;

            padding-top:25px;

            border-top:
            1px solid rgba(255,255,255,0.1);

            display:flex;

            justify-content:space-between;

            font-size:1.4rem;

            font-weight:700;
        }

        .promo-box{

            margin-top:30px;
        }

        .promo-box input{

            width:100%;

            padding:16px;

            border:none;

            outline:none;

            border-radius:16px;

            background:
            rgba(255,255,255,0.08);

            color:white;

            margin-bottom:15px;
        }

        .btn-primary{

            width:100%;

            padding:18px;

            border:none;

            border-radius:18px;

            cursor:pointer;

            font-size:16px;

            font-weight:700;

            color:#2a0006;

            background:
            linear-gradient(
                135deg,
                #ffd700,
                #f5d76e
            );

            transition:0.4s ease;
        }

        .btn-primary:hover{

            transform:
            translateY(-5px);

            box-shadow:
            0 18px 35px
            rgba(255,215,0,0.3);
        }

        .checkout-btn{

            margin-top:30px;
        }

        .secure-checkout{

            margin-top:25px;

            text-align:center;

            color:
            rgba(255,255,255,0.6);

            font-size:14px;
        }

        .empty-cart{

            text-align:center;

            padding:100px 20px;
        }

        .empty-cart i{

            font-size:5rem;

            color:#ffd700;

            margin-bottom:25px;
        }

        .empty-cart h2{

            margin-bottom:15px;

            font-size:2rem;
        }

        .continue-btn{

            margin-top:30px;

            display:inline-block;

            padding:16px 32px;

            border-radius:18px;

            background:
            linear-gradient(
                135deg,
                #ffd700,
                #f5d76e
            );

            color:#2a0006;

            font-weight:700;
        }

        @media(max-width:1000px){

            .cart-layout{

                grid-template-columns:1fr;
            }

            .cart-summary{

                position:relative;

                top:0;
            }
        }

        @media(max-width:768px){

            .cart-header h1{

                font-size:2.7rem;
            }

            .cart-card{

                flex-direction:column;

                text-align:center;
            }

            .cart-controls{

                align-items:center;
            }
        }

    </style>

</head>

<body>

    <!-- =========================================================

    <div id="navbar-placeholder"></div>

    <!-- =========================================================

    <section class="cart-page">

        <div class="cart-header">

            <h1>Your Cart</h1>

            <p>

                Review your premium Nexstep collection
                before checkout.

            </p>

        </div>

        <div class="cart-layout">

            <!-- =========================================================
                 CART ITEMS
            ========================================================== -->

            <div id="cart-items" class="cart-items">

                <!-- JS ITEMS -->

            </div>

            <!-- =========================================================
                 CART SUMMARY

            <div class="cart-summary">

                <h2 class="summary-title">

                </h2>

                <div class="summary-row">

                    <span>Subtotal</span>

                    <span id="subtotal">

<script>

/* =========================================================
   LOAD NAVBAR
========================================================= */

fetch('navbar.html')

.then(res => res.text())

.then(html => {

    document.getElementById(
        'navbar-placeholder'
    ).innerHTML = html;

    if(typeof Cart !== 'undefined'){

        Cart.updateUI();
    }
});

/* =========================================================
   LOAD FOOTER
========================================================= */

fetch('footer.html')

.then(res => res.text())

.then(html => {

    document.getElementById(
        'footer-placeholder'
    ).innerHTML = html;
});

/* =========================================================
   RENDER CART
========================================================= */

function renderCart(){

    const container =
    document.getElementById(
        'cart-items'
    );

    /* GET REAL CART */

    let items =
    JSON.parse(
        localStorage.getItem('cart')
    ) || [];

    /* UPDATE CART OBJECT */

    if(typeof Cart !== 'undefined'){

        Cart.items = items;
    }

    /* EMPTY CART */

    if(items.length === 0){

        container.innerHTML = `

            <div class="empty-cart">

                <i class="fas fa-shopping-bag"></i>

                <h2>

                    Your Cart Is Empty

                </h2>

                <p>

                    Looks like you haven't
                    added anything yet.

                </p>

                <a href="products.html"
                   class="continue-btn">

                    Continue Shopping

                </a>

            </div>

        `;

        document.getElementById(
            'subtotal'
        ).textContent = '₹0';

        document.getElementById(
            'tax'
        ).textContent = '₹0';

        document.getElementById(
            'total'
        ).textContent = '₹0';

        return;
    }

    /* =====================================================
       SHOW PRODUCTS
    ===================================================== */

    container.innerHTML =
    items.map(item => `

        <div class="cart-card">

            <img
                src="${item.image}"

                alt="${item.name}"

                onerror="
                this.src=
                'nexstep logo.jpeg'
                "
            >

            <div class="cart-info">

                <h3>

                    ${item.name}

                </h3>

                <div class="product-category">

                    ${item.category || 'Premium Sneakers'}

                </div>

                <div class="price">

                    ₹${item.price.toLocaleString('en-IN')}

                </div>

            </div>

            <div class="cart-controls">

                <div class="quantity-box">

                    <button
                        class="qty-btn"

                        onclick="
                        decreaseQty(${item.id})
                        "
                    >

                        -

                    </button>

                    <span>

                        ${item.quantity}

                    </span>

                    <button
                        class="qty-btn"

                        onclick="
                        increaseQty(${item.id})
                        "
                    >

                        +

                    </button>

                </div>

                <button
                    class="remove-btn"

                    onclick="
                    removeItem(${item.id})
                    "
                >

                    <i class="fas fa-trash"></i>

                    Remove

                </button>

            </div>

        </div>

    `).join('');

    /* =====================================================
       CALCULATE SUMMARY
    ===================================================== */

    let subtotal = 0;

    items.forEach(item => {

        subtotal +=
        item.price * item.quantity;
    });

    const tax =
    subtotal * 0.08;

    const total =
    subtotal + tax;

    document.getElementById(
        'subtotal'
    ).textContent =
    `₹${subtotal.toLocaleString('en-IN')}`;

    document.getElementById(
        'tax'
    ).textContent =
    `₹${Math.round(tax).toLocaleString('en-IN')}`;

    document.getElementById(
        'total'
    ).textContent =
    `₹${Math.round(total).toLocaleString('en-IN')}`;
}

/* =========================================================
   INCREASE QUANTITY
========================================================= */

function increaseQty(id){

    let items =
    JSON.parse(
        localStorage.getItem('cart')
    ) || [];

    const product =
    items.find(item => item.id === id);

    if(product){

        product.quantity += 1;
    }

    localStorage.setItem(
        'cart',
        JSON.stringify(items)
    );

    renderCart();

    if(typeof Cart !== 'undefined'){

        Cart.items = items;

        Cart.updateUI();
    }
}

/* =========================================================
   DECREASE QUANTITY
========================================================= */

function decreaseQty(id){

    let items =
    JSON.parse(
        localStorage.getItem('cart')
    ) || [];

    const product =
    items.find(item => item.id === id);

    if(product){

        product.quantity -= 1;

        if(product.quantity <= 0){

            items =
            items.filter(
                item => item.id !== id
            );
        }
    }

    localStorage.setItem(
        'cart',
        JSON.stringify(items)
    );

    renderCart();

    if(typeof Cart !== 'undefined'){

        Cart.items = items;

        Cart.updateUI();
    }
}

/* =========================================================
   REMOVE ITEM
========================================================= */

function removeItem(id){

    let items =
    JSON.parse(
        localStorage.getItem('cart')
    ) || [];

    items =
    items.filter(
        item => item.id !== id
    );

    localStorage.setItem(
        'cart',
        JSON.stringify(items)
    );

    renderCart();

    if(typeof Cart !== 'undefined'){

        Cart.items = items;

        Cart.updateUI();
    }
}

/* =========================================================
   PROMO CODE
========================================================= */

function applyPromo(){

    const promo =
    document.getElementById(
        'promo-code'
    ).value;

    if(promo.toLowerCase() === 'nexstep20'){

        alert(
            'Promo Code Applied Successfully!'
        );

    }else{

        alert(
            'Invalid Promo Code'
        );
    }
}

/* =========================================================
   INITIAL RENDER
========================================================= */

renderCart();

</script>
