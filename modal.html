<div id="modal-container" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 3000; align-items: center; justify-content: center;">
    <div class="modal-content" style="background: var(--bg-color); padding: 40px; border-radius: 12px; max-width: 500px; width: 90%; position: relative; animation: fadeIn 0.3s ease;">
        <button onclick="closeModal()" style="position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-color);">&times;</button>
        <div id="modal-body"></div>
    </div>
</div>

<script>
    function openModal(content) {
        document.getElementById('modal-body').innerHTML = content;
        document.getElementById('modal-container').style.display = 'flex';
    }
    function closeModal() {
        document.getElementById('modal-container').style.display = 'none';
    }
</script>
